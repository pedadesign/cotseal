<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIET 204 — Bài Thi Cuối Kỳ — Đề B</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --navy:#1A3A5C;--navy2:#243F62;--blue:#2563A8;
  --accent:#4A90D9;--light:#E8F0FA;
  --dark:#1A2636;--gray:#6B7C8F;--mid:#DDE3EB;
  --green:#27AE60;--amber:#F39C12;--danger:#E74C3C;
  --white:#FFFFFF;--bg:#F0F4FA;--yellow:#FFFDE7;
}
body{background:var(--bg);color:var(--dark);min-height:100vh}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.screen.top{justify-content:flex-start;padding-top:24px}
.wrap{max-width:740px;width:100%}

/* Header bar */
.exam-bar{background:var(--navy);color:#fff;padding:11px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:10px;margin-bottom:14px}
.exam-bar .etitle{font-size:13px;font-weight:700;letter-spacing:.4px}
.exam-bar .emeta{font-size:11px;color:#A8C0D6}

/* Cards */
.card{background:var(--white);border-radius:14px;box-shadow:0 3px 16px rgba(0,0,0,.09);padding:38px}
.card.sm{max-width:520px;width:100%}

/* Typography */
.unc-logo{font-size:13px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:5px}
.unc-dept{font-size:11px;color:var(--gray);text-align:center;margin-bottom:22px}
.exam-title{font-size:25px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:5px}
.exam-sub{font-size:14px;color:var(--gray);text-align:center;margin-bottom:26px}
.exam-details{background:var(--bg);border-radius:10px;padding:16px 20px;margin-bottom:26px}
.detail-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--mid)}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:var(--gray)}.detail-row .val{font-weight:600;color:var(--navy)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,58,92,.35)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#229954;transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1D56A0;transform:translateY(-1px)}
.btn-ghost{background:var(--mid);color:var(--dark)}.btn-ghost:hover{background:#C8D0D9}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-full{width:100%;justify-content:center}

/* Forms */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 15px;border:2px solid var(--mid);border-radius:9px;font-size:14px;color:var(--dark);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--blue)}
.form-row{display:flex;gap:14px}
.form-row .form-group{flex:1}

/* Instructions */
.instr-list{list-style:none;margin:16px 0 22px}
.instr-list li{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--mid);font-size:14px;line-height:1.5}
.instr-list li:last-child{border-bottom:none}
.instr-icon{font-size:19px;flex-shrink:0;width:26px;text-align:center}

/* Part headers */
.part-banner{background:var(--navy);color:#fff;padding:13px 22px;border-radius:10px;margin-bottom:16px}
.part-banner h2{font-size:15px;font-weight:700}
.part-banner .pts{font-size:12px;color:#A8C0D6;margin-top:2px}

/* Reading passage */
.passage-box{background:var(--white);border:1px solid var(--mid);border-radius:10px;padding:22px 26px;margin-bottom:18px;font-size:14px;line-height:1.75;color:var(--dark)}
.no-copy{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
.no-copy::selection,.no-copy *::selection{background:transparent}
.no-copy::-moz-selection,.no-copy *::-moz-selection{background:transparent}
.passage-title{font-size:16px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:14px}
.passage-para{margin-bottom:12px}
.passage-source{font-size:12px;color:var(--gray);font-style:italic;margin-top:10px}

/* Activity sections */
.act-section{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.act-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
.act-instr{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:14px;line-height:1.5}
.act-instr-vi{font-size:13px;color:var(--dark);margin-bottom:4px}

/* Vocab table */
.vocab-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.vocab-table th{background:var(--navy);color:#fff;padding:8px 12px;text-align:left;font-weight:600}
.vocab-table td{padding:7px 12px;border-bottom:1px solid var(--mid);vertical-align:middle}
.vocab-table tr:last-child td{border-bottom:none}
.vocab-table tr:nth-child(even) td{background:#F7F9FC}
.vocab-table select{padding:5px 8px;border:1.5px solid var(--mid);border-radius:6px;font-size:13px;color:var(--dark);background:#fff;outline:none}
.vocab-table select:focus{border-color:var(--blue)}

/* T/F items */
.tf-item{padding:12px 0;border-bottom:1px solid var(--mid)}
.tf-item:last-child{border-bottom:none}
.tf-stmt{font-size:14px;color:var(--dark);margin-bottom:8px;line-height:1.55}
.tf-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tf-radio{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.tf-radio input{accent-color:var(--blue);width:15px;height:15px}
.tf-correction{flex:1;min-width:200px;padding:7px 11px;border:1.5px solid var(--mid);border-radius:7px;font-size:13px;color:var(--dark);outline:none;transition:border-color .2s}
.tf-correction:focus{border-color:var(--blue)}

/* Comprehension */
.comp-q{margin-bottom:20px}
.comp-q p{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:6px;line-height:1.5}
.comp-q textarea{width:100%;padding:10px 13px;border:1.5px solid var(--mid);border-radius:8px;font-size:14px;color:var(--dark);resize:vertical;min-height:72px;outline:none;line-height:1.6;font-family:inherit;transition:border-color .2s}
.comp-q textarea:focus{border-color:var(--blue)}

/* Cloze */
.cloze-box{background:var(--yellow);border:1px solid #FBBF24;border-radius:10px;padding:18px 22px;line-height:2.4;font-size:14px;color:var(--dark)}
.cloze-input{display:inline-block;border:none;border-bottom:2px solid var(--blue);background:transparent;font-size:14px;color:var(--dark);font-family:inherit;outline:none;min-width:120px;padding:0 4px;vertical-align:baseline}
.cloze-input:focus{border-bottom-color:var(--navy)}

/* Progress */
.prog-header{background:var(--white);border-radius:12px;padding:14px 18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stage-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue)}
.q-num{font-size:12px;color:var(--gray)}
.prog-track{height:5px;background:var(--mid);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--accent));border-radius:3px;transition:width .5s ease}
.dots{display:flex;gap:7px;margin-top:8px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--mid);transition:all .3s;flex-shrink:0}
.dot.done{background:var(--green)}.dot.active{background:var(--blue);transform:scale(1.3)}

/* RP turn card */
.rp-card{background:var(--white);border-radius:14px;padding:28px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:12px}
.rp-badge{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.char-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);margin-bottom:4px}
.q-vi{font-size:18px;font-weight:600;line-height:1.65;margin-bottom:8px;white-space:pre-line;color:var(--navy)}
.q-en{font-size:13px;color:var(--gray);font-style:italic;line-height:1.55;white-space:pre-line;margin-bottom:8px}
.q-hint{background:var(--light);border-left:3px solid var(--blue);border-radius:0 7px 7px 0;padding:8px 13px;font-size:12px;color:#1D4E89;margin-top:10px}
.q-hint span{font-weight:700}
.tts-indicator{display:inline-flex;align-items:center;gap:7px;background:#EEF5FB;color:var(--blue);font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;margin-top:12px}
.tts-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Timer */
.timer-section{background:var(--white);border-radius:14px;padding:18px 26px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:12px}
.timer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.timer-label{font-size:13px;font-weight:600}
.timer-num{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:42px;text-align:right;transition:color .5s}
.timer-track{height:11px;background:var(--mid);border-radius:6px;overflow:hidden}
.timer-fill{height:100%;border-radius:6px;transition:width .1s linear,background .5s}

/* Recording panel */
.rec-panel{background:var(--white);border-radius:14px;padding:24px 28px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.rec-center{text-align:center;margin-bottom:14px}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;transition:all .25s}
.mic-wait{background:var(--mid);color:var(--gray);cursor:default}
.mic-ready{background:#EEF5FB;color:var(--blue);cursor:default;animation:pulse-blue 1.2s infinite}
@keyframes pulse-blue{0%,100%{box-shadow:0 0 0 0 rgba(74,144,217,.4)}60%{box-shadow:0 0 0 18px rgba(74,144,217,0)}}
.mic-rec{background:var(--danger);color:#fff;cursor:default;animation:pulse-red 1.4s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.45)}60%{box-shadow:0 0 0 20px rgba(231,76,60,0)}}
.rec-status{font-size:13px;color:var(--gray);line-height:1.5}
.rec-status strong{color:var(--danger)}
.countdown-num{font-size:52px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:8px;animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1.4);opacity:.6}100%{transform:scale(1);opacity:1}}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:42px;margin:12px 0}
.wb{width:4px;background:var(--danger);border-radius:2px;opacity:.12}
.wave.on .wb{opacity:1;animation:wv .7s ease-in-out infinite}
@keyframes wv{0%,100%{height:5px}50%{height:32px}}
.tr-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;background:var(--danger);border-radius:50%;animation:blink 1s infinite}
.tr-box{background:#F5F7FA;border:1px solid var(--mid);border-radius:10px;padding:14px 18px;min-height:68px;font-size:14px;line-height:1.65}
.tr-empty{color:var(--gray);font-style:italic}
.act-row{display:flex;justify-content:flex-end;margin-top:16px}
.adv-msg{text-align:center;padding:28px;color:var(--gray);font-size:15px}
.adv-msg strong{display:block;font-size:22px;color:var(--navy);margin-bottom:8px}

/* Part 3 writing */
.writing-box{width:100%;min-height:220px;padding:14px 18px;border:2px solid var(--mid);border-radius:10px;font-size:14px;color:var(--dark);line-height:1.75;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s}
.writing-box:focus{border-color:var(--blue)}
.word-count{font-size:12px;color:var(--gray);text-align:right;margin-top:5px}
.word-count.ok{color:var(--green);font-weight:600}

/* Results */
.res-masthead{background:var(--navy);color:#fff;border-radius:14px;padding:32px;margin-bottom:14px;text-align:center}
.section{background:var(--white);border-radius:14px;padding:24px 28px;box-shadow:0 3px 14px rgba(0,0,0,.08);margin-bottom:14px}
.section h3{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--navy)}
.log-item{padding:16px 0;border-bottom:1px solid var(--mid)}
.log-item:last-child{border-bottom:none;padding-bottom:0}
.log-q{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:3px}
.log-vi{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:7px}
.log-tr{font-size:14px;color:var(--dark);line-height:1.6;margin-bottom:8px}
.log-audio{width:100%;height:34px;border-radius:6px;accent-color:var(--navy)}
.download-status{font-size:13px;color:var(--green);text-align:center;margin-top:8px;display:none}
.res-footer{display:flex;gap:12px;justify-content:center;padding:18px 0 24px;flex-wrap:wrap}
@media print{body{background:#fff}.res-footer,.btn{display:none!important}.section,.res-masthead{box-shadow:none;border:1px solid #DDD}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── ROLE-PLAY TURNS (Part 2) ────────────────────────────────────────────────
const RP = [
  {id:1,
   vi:'Xin chào anh/chị! Em là Minh, sinh viên năm nhất ngành Kinh tế. Em nghe nói anh/chị đang tình nguyện tư vấn hôm nay phải không?\n\nEm... thật ra em hơi lo lắng và không biết bắt đầu nói từ đâu nữa. Anh/chị có thể giúp em không?',
   tts:'Xin chào anh chị! Em là Minh, sinh viên năm nhất ngành Kinh tế. Em nghe nói anh chị đang tình nguyện tư vấn hôm nay phải không? Em thật ra hơi lo lắng và không biết bắt đầu nói từ đâu nữa. Anh chị có thể giúp em không?',
   en:'Hello! I\'m Minh, a first-year Economics student. I heard you\'re volunteering as a counselor today? I\'m anxious and don\'t know where to start. Can you help me?',
   hint:'Giới thiệu bản thân • Thể hiện sự đồng cảm • Mở đầu cuộc trò chuyện tự nhiên',
   time:65},
  {id:2,
   vi:'Dạ... bố mẹ muốn em học Y khoa nhưng em lại thích Kinh tế. Em cảm thấy rất áp lực, nhiều khi muốn bỏ học luôn.\n\nAnh/chị có biết vì sao người trẻ thế hệ em lại hay bị kiệt sức và áp lực như vậy không?',
   tts:'Dạ bố mẹ muốn em học Y khoa nhưng em lại thích Kinh tế. Em cảm thấy rất áp lực, nhiều khi muốn bỏ học luôn. Anh chị có biết vì sao người trẻ thế hệ em lại hay bị kiệt sức và áp lực như vậy không?',
   en:'My parents want me to study Medicine but I like Economics. I feel so pressured, sometimes I want to drop out. Do you know why young people like me get burned out?',
   hint:'Dùng "Sở dĩ … là vì …" hoặc "Vì/Do/Bởi … nên …" • Tham chiếu bài đọc về thế hệ Z',
   time:80},
  {id:3,
   vi:'Em có đọc bài báo về thế hệ Z và sức khỏe tâm thần trước khi đến đây. Nhưng em chưa hiểu hết.\n\nBài báo nói gì về những điểm mạnh của thế hệ em? Và tại sao nhiều bạn trẻ tìm đến văn hóa truyền thống để giảm căng thẳng?',
   tts:'Em có đọc bài báo về thế hệ Z và sức khỏe tâm thần trước khi đến đây. Nhưng em chưa hiểu hết. Bài báo nói gì về những điểm mạnh của thế hệ em? Và tại sao nhiều bạn trẻ tìm đến văn hóa truyền thống để giảm căng thẳng?',
   en:'I read the article about Gen Z and mental health. What did it say about Gen Z\'s strengths? And why do young people turn to traditional culture to reduce stress?',
   hint:'Dùng động từ báo cáo: bài báo chỉ ra / nghiên cứu cho biết / theo báo cáo / nhấn mạnh rằng',
   time:80},
  {id:4,
   vi:'Em thấy mình lúc nào cũng bận rộn, không có thời gian cho bản thân chút nào.\n\nAnh/chị có thể đề xuất cho em một vài cách cụ thể để cân bằng việc học và cuộc sống không?',
   tts:'Em thấy mình lúc nào cũng bận rộn, không có thời gian cho bản thân chút nào. Anh chị có thể đề xuất cho em một vài cách cụ thể để cân bằng việc học và cuộc sống không?',
   en:'I feel like I\'m always busy with no time for myself. Can you suggest specific ways to balance studying and personal life?',
   hint:'Đưa ra ít nhất 3 lời khuyên • Dùng từ vựng sức khỏe tâm thần (M6): căng thẳng, thư giãn, cân bằng…',
   time:80},
  {id:5,
   vi:'Anh/chị ơi, em cũng muốn kết nối nhiều hơn với văn hóa Việt nhưng không biết bắt đầu từ đâu.\n\nAnh/chị thích những hoạt động văn hóa Việt nào? Anh/chị có nghĩ điều đó giúp ích cho sức khỏe tâm thần không?',
   tts:'Anh chị ơi, em cũng muốn kết nối nhiều hơn với văn hóa Việt nhưng không biết bắt đầu từ đâu. Anh chị thích những hoạt động văn hóa Việt nào? Anh chị có nghĩ điều đó giúp ích cho sức khỏe tâm thần không?',
   en:'I want to connect more with Vietnamese culture but don\'t know where to start. What Vietnamese cultural activities do you enjoy? Does it help with mental health?',
   hint:'Chia sẻ sở thích cá nhân • Kết nối bản sắc văn hóa với sức khỏe tâm thần (chủ đề M9)',
   time:65},
  {id:6,
   vi:'Cảm ơn anh/chị rất nhiều! Những điều anh/chị chia sẻ hôm nay thực sự rất hữu ích cho em.\n\nTrước khi kết thúc, anh/chị có muốn nói thêm điều gì hoặc có lời động viên nào cho em không?',
   tts:'Cảm ơn anh chị rất nhiều! Những điều anh chị chia sẻ hôm nay thực sự rất hữu ích cho em. Trước khi kết thúc, anh chị có muốn nói thêm điều gì hoặc có lời động viên nào cho em không?',
   en:'Thank you so much! Everything you shared was very helpful. Before we finish, is there anything else you\'d like to add or any words of encouragement for me?',
   hint:'Kết thúc tự nhiên • Thể hiện sự quan tâm • Khuyến khích tích cực',
   time:65}
];

// ─── ACTIVITY A ANSWER KEY ───────────────────────────────────────────────────
const A_KEY = ['e','c','f','a','g','i','b','d','h','j'];

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {
  screen:'welcome',
  name:'', section:'',
  // Part 1 answers
  p1a: Array(10).fill(''),          // Activity A selects
  p1b_tf: Array(5).fill(''),        // Activity B T/F
  p1b_cor: Array(5).fill(''),       // Activity B corrections
  p1c: Array(4).fill(''),           // Activity C
  p1d: Array(10).fill(''),          // Activity D cloze
  // Part 2
  ri:0, rState:'tts',
  cdown:3, timeLeft:0, totalTime:0,
  curTr:'', finalTr:'',
  responses:[],
  audioChunks:[], audioBlobs:[], audioURLs:[],
  scores:null,
  stream:null, recorder:null, recog:null,
  timerInterval:null, cdInterval:null,
  // Part 3
  writing:'',
};

// ─── ANTI-COPY PROTECTION ────────────────────────────────────────────────────
document.addEventListener('copy', function(e){
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed) return;
  // Block copy if the anchor node is inside a .no-copy element
  let node = sel.anchorNode;
  while(node){
    if(node.classList && node.classList.contains('no-copy')){ e.preventDefault(); return; }
    node = node.parentElement;
  }
});
document.addEventListener('keydown', function(e){
  // Block Ctrl+A select-all while a .no-copy section is visible
  if((e.ctrlKey||e.metaKey) && e.key==='a'){
    const focused = document.activeElement;
    if(focused && (focused.tagName==='TEXTAREA'||focused.tagName==='INPUT')) return;
    const noCopyVisible = document.querySelector('.no-copy');
    if(noCopyVisible){ e.preventDefault(); }
  }
});

// ─── TTS / AUDIO ─────────────────────────────────────────────────────────────
let _rpAudio = null;

function ttsSpeak(text, onDone){
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang='vi-VN'; utt.rate=0.80; utt.pitch=1.0;
  const voices = speechSynthesis.getVoices();
  const vi = voices.find(v=>v.lang.startsWith('vi'));
  if(vi) utt.voice=vi;
  const maxMs = Math.max(text.length*130, 4500);
  let done=false;
  const guard = setTimeout(()=>{if(!done){done=true;onDone()}},maxMs);
  utt.onend = ()=>{if(!done){done=true;clearTimeout(guard);onDone()}};
  utt.onerror = ()=>{if(!done){done=true;clearTimeout(guard);onDone()}};
  speechSynthesis.speak(utt);
}

// Play instructor recording; fall back to TTS if file missing or errors
function speakTurn(text, onDone){
  if(_rpAudio){ _rpAudio.pause(); _rpAudio.src=''; _rpAudio=null; }
  const file = RP_AUDIO[S.ri];
  if(!file){ ttsSpeak(text, onDone); return; }
  const audio = new Audio(file);
  _rpAudio = audio;
  let fired = false;
  function done(){ if(!fired){ fired=true; _rpAudio=null; onDone(); } }
  audio.onended = done;
  audio.onerror = ()=>{ _rpAudio=null; ttsSpeak(text, onDone); };
  audio.play().catch(()=>{
    // Autoplay blocked — show a tap-to-play button
    const btn = document.getElementById('tap-play-btn');
    if(btn){
      btn.style.display='inline-flex';
      btn.onclick=()=>{ btn.style.display='none'; audio.play().catch(()=>{ _rpAudio=null; ttsSpeak(text,onDone); }); };
    } else { _rpAudio=null; ttsSpeak(text, onDone); }
  });
}

// ─── RECORDING ───────────────────────────────────────────────────────────────
async function askMic(){
  try{S.stream=await navigator.mediaDevices.getUserMedia({audio:true});return true}
  catch(e){return false}
}
function startRecording(){
  S.curTr=''; S.finalTr=''; S.audioChunks=[];
  if(S.stream){
    try{ S.recorder=new MediaRecorder(S.stream,{mimeType:'audio/webm'}) }
    catch(e){ try{S.recorder=new MediaRecorder(S.stream)}catch(e2){S.recorder=null} }
    if(S.recorder){
      S.recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)S.audioChunks.push(e.data)};
      S.recorder.onstop=()=>{
        if(S.audioChunks.length>0){
          const blob=new Blob(S.audioChunks,{type:S.recorder.mimeType||'audio/webm'});
          S.audioBlobs.push(blob); S.audioURLs.push(URL.createObjectURL(blob));
        } else { S.audioBlobs.push(null); S.audioURLs.push(null); }
      };
      S.recorder.start(200);
    }
  } else { S.audioBlobs.push(null); S.audioURLs.push(null); }

  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    S.recog = new SR();
    S.recog.continuous=true; S.recog.interimResults=true; S.recog.lang='vi-VN';
    S.recog.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
        else int+=e.results[i][0].transcript;
      }
      S.finalTr+=fin; S.curTr=S.finalTr+int;
      const el=document.getElementById('trbox');
      if(el){el.textContent=S.curTr||'Đang nghe…';el.className='tr-box'}
    };
    S.recog.onerror=()=>{};
    try{S.recog.start()}catch(e){}
  }
}
function stopRecording(){
  if(S.recog){try{S.recog.stop()}catch(e){}}
  if(S.recorder&&S.recorder.state!=='inactive'){
    try{S.recorder.stop()}catch(e){}
  } else if(S.stream&&(!S.recorder)){
    S.audioBlobs.push(null); S.audioURLs.push(null);
  }
  S.curTr = S.finalTr.trim();
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer(sec){
  S.totalTime=sec*1000; S.timeLeft=S.totalTime;
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    S.timeLeft-=100;
    updateTimerUI();
    if(S.timeLeft<=0){clearInterval(S.timerInterval);handleTimerEnd()}
  },100);
}
function updateTimerUI(){
  const pct=Math.max(0,S.timeLeft/S.totalTime*100);
  const secs=Math.ceil(S.timeLeft/1000);
  const fill=document.getElementById('timer-fill');
  const num=document.getElementById('timer-num');
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'#27AE60':pct>25?'#F39C12':'#E74C3C'}
  if(num){num.textContent=secs+'s';num.style.color=pct>50?'#27AE60':pct>25?'#F39C12':'#E74C3C'}
}
function handleTimerEnd(){
  stopRecording(); S.rState='advancing'; render();
  setTimeout(()=>advanceTurn(),1400);
}
function doneSpeaking(){
  clearInterval(S.timerInterval);
  stopRecording(); S.rState='advancing'; render();
  setTimeout(()=>advanceTurn(),1100);
}
function advanceTurn(){
  S.responses.push(S.curTr||S.finalTr||'');
  if(S.ri<RP.length-1){
    S.ri++; S.rState='tts'; S.curTr=''; S.finalTr=''; render(); beginTurn();
  } else {
    S.screen='part3'; render();
  }
}

// ─── TURN FLOW ────────────────────────────────────────────────────────────────
function beginTurn(){
  S.rState='tts';
  speakTurn(RP[S.ri].tts, ()=>startCountdown());
}
function startCountdown(){
  S.rState='countdown'; S.cdown=3; render();
  S.cdInterval=setInterval(()=>{
    S.cdown--;
    if(S.cdown<=0){
      clearInterval(S.cdInterval);
      S.rState='recording'; render();
      startRecording();
      startTimer(RP[S.ri].time);
    } else {
      const el=document.getElementById('cdnum');
      if(el){el.textContent=S.cdown;el.style.animation='none';void el.offsetHeight;el.style.animation=''}
    }
  },1000);
}

// ─── SCORING (Part 2 auto) ────────────────────────────────────────────────────
function calcScores(rs){
  const all=rs.join(' ').toLowerCase();
  // Key structures
  const hasSoiDi = /sở dĩ/.test(all);
  const hasViBoi = /vì .{2,30} nên|do .{2,30} nên|bởi .{2,30} nên/.test(all);
  const struct = (hasSoiDi?1:0)+(hasViBoi?1:0);
  // Report verbs
  const rvKW=['chỉ ra','cho thấy','cho biết','nhấn mạnh','theo báo cáo','theo nghiên cứu','đề xuất','kết luận'];
  const rvCount=rvKW.filter(k=>all.includes(k)).length;
  // Mental health vocab
  const mhKW=['kiệt sức','căng thẳng','cân bằng','lo lắng','tâm thần','áp lực','thư giãn','sức khỏe','burnout','đồng cảm','thông cảm'];
  const mhCount=mhKW.filter(k=>all.includes(k)).length;
  // Fluency proxy (avg words per turn)
  const avgW=rs.reduce((s,r)=>s+(r.trim().split(/\s+/).filter(w=>w.length>1).length),0)/Math.max(rs.length,1);
  // Polite markers
  const pol=['dạ','vâng','thưa','cảm ơn','xin lỗi','anh ơi','chị ơi'];
  const polCount=pol.filter(p=>all.includes(p)).length;
  return{struct,rvCount,mhCount,avgW:Math.round(avgW),polCount,
    taskScore:Math.min(6,rs.filter(r=>r.trim().length>20).length),
    total:0};
}

// ─── DOWNLOAD ─────────────────────────────────────────────────────────────────
async function blobToBase64(blob){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onloadend=()=>resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

    </div>
    <textarea class="writing-box" id="writing" placeholder="Viết bài tại đây… (tiêu đề, nội dung, lời kết)" oninput="updateWC(this.value)">${S.writing}</textarea>
  </div>

  <div style="padding:16px 0 32px;display:flex;justify-content:flex-end">
    <button class="btn btn-navy" onclick="submitPart3()">Hoàn thành & Xem kết quả →</button>
  </div>
</div></div>`}

// ─── RESULTS RENDER ───────────────────────────────────────────────────────────
function rResults(){
  const now=new Date().toLocaleDateString('vi-VN',{year:'numeric',month:'long',day:'numeric'});
  const wc=wordCount(S.writing);
  const sc=calcScores(S.responses);
  const turnLog=RP.map((q,i)=>{
    const url=S.audioURLs[i]||null;
    return`<div class="log-item">
      <div class="log-q">Lượt ${i+1} — ${q.vi.split('\n')[0].slice(0,60)}…</div>
      <div class="log-vi">${q.en.slice(0,80)}…</div>
      ${S.responses[i]?`<div class="log-tr">${S.responses[i]}</div>`:`<div style="font-size:13px;color:#CCC;font-style:italic">[Không có transcript]</div>`}
      ${url?`<audio controls class="log-audio" src="${url}"></audio>`:`<div style="font-size:12px;color:#CCC;font-style:italic">[Không có audio]</div>`}
    </div>`;
  }).join('');

  return`<div class="screen top"><div class="wrap">
  <div class="res-masthead" style="text-align:center;padding:36px 28px">
    <div style="font-size:56px;line-height:1;margin-bottom:14px">✓</div>
    <div style="font-size:13px;color:#A8C0D6">${S.name||'Sinh viên'}${S.section?' · Section '+S.section:''}</div>
    <div style="font-size:17px;font-weight:700;margin-top:6px">VIET 204 — Bài Thi Cuối Kỳ Đề B · Spring 2026</div>
    <p style="font-size:13px;color:#A8C0D6;margin-top:8px">${now}</p>
  </div>

  <div class="section">
    <h3>📊 Tóm tắt bài thi</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:14px">
      <div style="background:var(--light);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:4px">Phần 1</div>
        <div style="font-size:20px;font-weight:800;color:var(--navy)">Đọc</div>
        <div style="font-size:12px;color:var(--gray)">40 điểm</div>
      </div>
      <div style="background:var(--light);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:4px">Phần 2</div>
        <div style="font-size:20px;font-weight:800;color:var(--navy)">${S.responses.filter(r=>r.trim().length>10).length}/${RP.length} lượt</div>
        <div style="font-size:12px;color:var(--gray)">30 điểm · ${sc.avgW} từ TB/lượt</div>
      </div>
      <div style="background:${wc>=150?'#E8F8EF':'var(--light)'};border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:4px">Phần 3</div>
        <div style="font-size:20px;font-weight:800;color:var(--navy)">${wc} từ</div>
        <div style="font-size:12px;color:${wc>=150?'var(--green)':'var(--gray)'}">${wc>=150?'✓ Đủ yêu cầu':'Cần ≥ 150 từ'}</div>
      </div>
    </div>
  </div>

  <div class="section" style="text-align:center;padding:32px 28px">
    <p style="font-size:15px;color:var(--dark);line-height:1.75;margin-bottom:24px">Câu trả lời của bạn đã được lưu lại.<br>Tải file ZIP bên dưới và <strong>nộp qua Canvas</strong> để nhận điểm và nhận xét từ thầy/cô.</p>
    <button class="btn btn-blue btn-full" id="dl-btn" onclick="downloadSubmission()">📥 Tải file nộp bài (.zip)</button>
    <p class="download-status" id="dl-status" style="margin-top:12px"></p>
    <button class="btn btn-ghost btn-full" style="margin-top:10px" onclick="
      const el=document.getElementById('resp-log');
      const open=el.style.display!=='none';
      el.style.display=open?'none':'block';
      this.textContent=open?'📋 Xem lại câu trả lời Phần 2':'▲ Ẩn câu trả lời';
    ">📋 Xem lại câu trả lời Phần 2</button>
  </div>

  <div id="resp-log" style="display:none">
    <div class="section"><h3>Phần 2 — Câu trả lời của bạn</h3>${turnLog}</div>
  </div>

  <div style="padding:8px 0 32px;text-align:center;font-size:12px;color:var(--gray)">
    Phung, H., Sakach, A., &amp; Nguyen, C. (2024). <em>Intermediate Vietnamese: A Task-Based Journey.</em> OER. | VIET 204 — UNC Chapel Hill
  </div>
</div></div>`}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function goInstructions(){
  const n=document.getElementById('inp-name');
  const s=document.getElementById('inp-sec');
  if(n) S.name=n.value.trim();
  if(s) S.section=s.value.trim();
  if(!S.name){alert('Vui lòng nhập họ và tên trước khi tiếp tục.');return}
  S.screen='instructions'; render();
}
async function grantMic(){
  try{const _ac=new(window.AudioContext||window.webkitAudioContext)();_ac.resume().catch(()=>{});}catch(e){}
  const ok=await askMic();
  if(ok){ S.screen='part1'; render(); }
  else{ alert('Không thể truy cập microphone.\n\nVui lòng bấm vào biểu tượng microphone trên thanh địa chỉ, cho phép truy cập, rồi tải lại trang.'); }
}
function skipMic(){ S.screen='part1'; render(); }
function submitPart1(){
  collectPart1();
  if(!S.stream){
    // No mic — skip to Part 3
    const go=confirm('Bạn chưa cấp quyền microphone. Bạn có muốn bỏ qua Phần 2 và chuyển thẳng sang Phần 3 không?');
    if(go){ S.screen='part3'; render(); }
    else {
      // Try to get mic now
      grantMicForP2();
    }
    return;
  }
  S.screen='part2intro'; render();
}
async function grantMicForP2(){
  const ok=await askMic();
  if(ok){ S.screen='part2intro'; render(); }
  else { S.screen='part3'; render(); }
}
function startPart2(){
  S.screen='part2'; render();
  setTimeout(()=>beginTurn(),300);
}
function updateWC(val){
  S.writing=val;
  const el=document.getElementById('wc-display');
  const wc=wordCount(val);
  if(el){ el.textContent=wc+' từ'+(wc>=150?' ✓':' / cần ≥ 150'); el.className='word-count'+(wc>=150?' ok':''); }
}
function submitPart3(){
  collectWriting();
  S.screen='results'; render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
const EXAM_KEY='viet204-formb-completed';
function rLocked(rec){return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F0F4FA;font-family:system-ui,sans-serif;">
  <div style="max-width:480px;text-align:center;padding:48px 32px;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);">
    <div style="font-size:3rem;margin-bottom:16px">🔒</div>
    <h2 style="margin:0 0 12px;font-size:1.4rem;color:#1A3A5C">Bài thi đã nộp</h2>
    <p style="color:#555;margin:0 0 20px;line-height:1.6">Bài thi này đã hoàn thành và file nộp bài đã được tải xuống.<br>Bài thi chỉ được làm một lần. Vui lòng nộp file ZIP của bạn qua Canvas.</p>
    <div style="background:#E8F0FA;border-radius:8px;padding:16px;font-size:.9rem;color:#333">
      <strong>Sinh viên:</strong> ${rec.name}<br>
      ${rec.section?`<strong>Lớp:</strong> ${rec.section}<br>`:''}
      <strong>Đã nộp:</strong> ${rec.dateStr}
    </div>
    <p style="margin-top:20px;font-size:.8rem;color:#999">Nếu bạn nghĩ đây là nhầm lẫn, vui lòng liên hệ giảng viên.</p>
  </div>
</div>`}
(function init(){
  const raw=localStorage.getItem(EXAM_KEY);
  if(raw){
    try{ document.getElementById('app').innerHTML=rLocked(JSON.parse(raw)); }
    catch(e){ document.getElementById('app').innerHTML=rLocked({name:'Unknown',section:'',dateStr:'Previously'}); }
  } else { render(); }
})();
</script>
</body>
