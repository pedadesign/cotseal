<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIET 102 — Final Speaking Exam — Form B</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{
  --navy:#13294B;--navy2:#1B3A5E;--blue:#4B9CD3;
  --red:#C0392B;--bg:#F0F3F8;
  --dark:#1A2636;--gray:#6B7C8F;--light:#DDE3EB;
  --green:#27AE60;--amber:#F39C12;--danger:#E74C3C;
  --white:#FFFFFF;
}
body{background:var(--bg);color:var(--dark);min-height:100vh}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.screen.top{justify-content:flex-start;padding-top:24px}
.wrap{max-width:700px;width:100%}

/* Exam header bar */
.exam-bar{background:var(--navy);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:10px;margin-bottom:16px}
.exam-bar .title{font-size:13px;font-weight:700;letter-spacing:.4px}
.exam-bar .meta{font-size:11px;color:#A8C0D6}

/* Cards */
.card{background:var(--white);border-radius:14px;box-shadow:0 3px 16px rgba(0,0,0,.09);padding:40px}
.card.sm{max-width:520px;width:100%}

/* Welcome */
.unc-logo{font-size:13px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:6px}
.unc-dept{font-size:11px;color:var(--gray);text-align:center;margin-bottom:24px}
.exam-title{font-size:26px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:6px}
.exam-sub{font-size:14px;color:var(--gray);text-align:center;margin-bottom:28px}
.exam-details{background:var(--bg);border-radius:10px;padding:18px 22px;margin-bottom:28px}
.detail-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--light)}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:var(--gray)}.detail-row .val{font-weight:600;color:var(--navy)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(19,41,75,.35)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#229954;transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#3A8EC4;transform:translateY(-1px)}
.btn-ghost{background:var(--light);color:var(--dark)}.btn-ghost:hover{background:#C8D0D9}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-full{width:100%;justify-content:center}

/* Form */
.form-group{margin-bottom:20px}
.form-label{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:7px;display:block}
.form-input{width:100%;padding:12px 16px;border:2px solid var(--light);border-radius:9px;font-size:15px;color:var(--dark);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--blue)}
.form-row{display:flex;gap:14px}
.form-row .form-group{flex:1}

/* Instructions */
.instr-list{list-style:none;margin:18px 0 24px}
.instr-list li{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--light);font-size:14px;line-height:1.5}
.instr-list li:last-child{border-bottom:none}
.instr-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}

/* Progress */
.prog-header{background:var(--white);border-radius:12px;padding:16px 20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.stage-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.q-num{font-size:12px;color:var(--gray)}
.prog-track{height:5px;background:var(--light);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--blue));border-radius:3px;transition:width .5s ease}
.dots{display:flex;gap:7px;margin-top:9px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--light);transition:all .3s;flex-shrink:0}
.dot.done{background:var(--green)}.dot.active{background:var(--blue);transform:scale(1.3)}

/* Question card */
.q-card{background:var(--white);border-radius:14px;padding:32px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:14px}
.rp-badge{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 12px;border-radius:20px;margin-bottom:14px}
.q-vi{font-size:20px;font-weight:600;line-height:1.6;margin-bottom:10px;white-space:pre-line;color:var(--navy)}
.q-en{font-size:14px;color:var(--gray);font-style:italic;line-height:1.55;white-space:pre-line}
.tts-indicator{display:inline-flex;align-items:center;gap:8px;background:#EEF5FB;color:var(--blue);font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;margin-top:14px}
.tts-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Timer */
.timer-section{background:var(--white);border-radius:14px;padding:20px 28px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:14px}
.timer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.timer-label{font-size:13px;font-weight:600}
.timer-num{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:42px;text-align:right;transition:color .5s}
.timer-track{height:12px;background:var(--light);border-radius:6px;overflow:hidden}
.timer-fill{height:100%;border-radius:6px;transition:width .1s linear,background .5s}

/* Recording panel */
.rec-panel{background:var(--white);border-radius:14px;padding:28px 32px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.rec-center{text-align:center;margin-bottom:18px}
.mic-btn{width:84px;height:84px;border-radius:50%;border:none;font-size:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;transition:all .25s}
.mic-wait{background:var(--light);color:var(--gray);cursor:default}
.mic-ready{background:#EEF5FB;color:var(--blue);cursor:default;animation:pulse-blue 1.2s infinite}
@keyframes pulse-blue{0%,100%{box-shadow:0 0 0 0 rgba(75,156,211,.4)}60%{box-shadow:0 0 0 18px rgba(75,156,211,0)}}
.mic-rec{background:var(--red);color:#fff;cursor:default;animation:pulse-red 1.4s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}60%{box-shadow:0 0 0 20px rgba(192,57,43,0)}}
.rec-status{font-size:13px;color:var(--gray);line-height:1.5}
.rec-status strong{color:var(--red)}
.countdown-num{font-size:56px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:8px;animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1.4);opacity:.6}100%{transform:scale(1);opacity:1}}

.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:44px;margin:14px 0}
.wb{width:4px;background:var(--red);border-radius:2px;opacity:.12}
.wave.on .wb{opacity:1;animation:wv .7s ease-in-out infinite}
@keyframes wv{0%,100%{height:5px}50%{height:34px}}

.tr-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1s infinite}
.tr-box{background:#F5F7FA;border:1px solid var(--light);border-radius:10px;padding:16px 20px;min-height:72px;font-size:14px;line-height:1.65}
.tr-empty{color:var(--gray);font-style:italic}
.act-row{display:flex;justify-content:flex-end;margin-top:18px}

/* Advancing */
.adv-msg{text-align:center;padding:32px;color:var(--gray);font-size:15px}
.adv-msg strong{display:block;font-size:22px;color:var(--navy);margin-bottom:8px}

/* Results */
.res-masthead{background:var(--navy);color:#fff;border-radius:14px;padding:32px;margin-bottom:14px;text-align:center}
.res-name{font-size:14px;color:#A8C0D6;margin-bottom:4px}
.res-course{font-size:18px;font-weight:700;margin-bottom:16px}
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid;margin:0 auto 14px}
.score-n{font-size:34px;font-weight:900;line-height:1}
.score-d{font-size:12px;opacity:.7;margin-top:2px}
.grade-lbl{font-size:24px;font-weight:900;margin-bottom:4px}
.lvl-pill{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:600}

.section{background:var(--white);border-radius:14px;padding:26px 30px;box-shadow:0 3px 14px rgba(0,0,0,.08);margin-bottom:14px}
.section h3{font-size:15px;font-weight:700;margin-bottom:20px;color:var(--navy)}
.rub-row{margin-bottom:18px}
.rub-lbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
.rub-name{font-weight:600;color:var(--dark)}.rub-pts{color:var(--gray)}
.bar-bg{height:9px;background:var(--light);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width 1.2s ease}

/* Response log */
.log-item{padding:18px 0;border-bottom:1px solid var(--light)}
.log-item:last-child{border-bottom:none;padding-bottom:0}
.log-q{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);margin-bottom:4px}
.log-vi{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:8px}
.log-tr{font-size:14px;color:var(--dark);line-height:1.6;margin-bottom:10px}
.log-empty{font-size:13px;color:#CCC;font-style:italic;margin-bottom:10px}
.log-audio{width:100%;height:36px;border-radius:6px;accent-color:var(--navy)}
.log-audio-label{font-size:11px;color:var(--gray);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.no-audio{font-size:12px;color:#CCC;font-style:italic}

.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.tag-g{background:#E8F8EF;color:#1A7A42}.tag-r{background:#FEF3F2;color:#922B21}
.rec-item{padding:12px 15px;background:#F0F7FF;border-left:3px solid var(--blue);border-radius:0 8px 8px 0;font-size:13px;color:#1A5276;margin-bottom:10px;line-height:1.55}
.instructor-notes{border:1px solid var(--light);border-radius:8px;min-height:90px;padding:14px;font-size:13px;color:var(--gray);font-style:italic}

.res-footer{display:flex;gap:12px;justify-content:center;padding:18px 0 28px;flex-wrap:wrap}
.download-status{font-size:13px;color:var(--green);text-align:center;margin-top:8px;display:none}

/* Print */
@media print{
  body{background:#fff}
  .res-footer,.btn,.exam-bar-screen{display:none!important}
  .section,.res-masthead{box-shadow:none;border:1px solid #DDD;page-break-inside:avoid}
  .log-audio{display:none}
  .audio-print-label{display:block!important}
  body{font-size:12px}
}
.audio-print-label{display:none;font-size:11px;color:#888;font-style:italic}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DATA ─────────────────────────────────────────────────────
// ─── QUESTION AUDIO — Form B (drop recordings in this folder) ──────────
const Q_AUDIO = [
  'Q01_Warm_up.webm',
  'Q02_Warm_up.webm',
  'Q03_Level_Check___Health.webm',
  'Q04_Level_Check___Health.webm',
  'Q05_Level_Check___Food.webm',
  'Q06_Level_Check___Food.webm',
  'Q07_Probe.webm',
  'Q08_Role_Play.webm',
  'Q09_Wind_down.webm'
];


const STAGES=['Warm-up','Level Check — Health','Level Check — Food','Probe','Role Play','Wind-down'];
const STAGE_CLR=['#4B9CD3','#E74C3C','#E67E22','#9B59B6','#13294B','#27AE60'];

const Qs=[
  // Warm-up
  {stage:0,time:30,
   vi:'Ban co tap the duc thuong xuyen khong? Ban thuong lam gi de giu suc khoe?',
   vi:'Bạn có tập thể dục thường xuyên không? Bạn thường làm gì để giữ sức khỏe?',
   tts:'Bạn có tập thể dục thường xuyên không? Bạn thường làm gì để giữ sức khỏe?',
   en:'Do you exercise regularly? What do you usually do to stay healthy?',
   kw:['tập','thể dục','chạy','bơi','đi bộ','sức khỏe','thường','ngủ','ăn','gym'],rp:false},
  {stage:0,time:35,
   vi:'Bạn thích ăn ở nhà hay ăn ở nhà hàng? Tại sao?',
   tts:'Bạn thích ăn ở nhà hay ăn ở nhà hàng? Tại sao?',
   en:'Do you prefer eating at home or at a restaurant? Why?',
   kw:['ăn','nhà','nhà hàng','vì','thích','ngon','tiện','rẻ','nấu','gia đình'],rp:false},
  // Level Check Health
  {stage:1,time:45,
   vi:'Khi bị cảm, bạn thường làm gì? Bạn có đi bác sĩ không hay tự uống thuốc?',
   tts:'Khi bị cảm, bạn thường làm gì? Bạn có đi bác sĩ không hay tự uống thuốc?',
   en:'When you have a cold, what do you usually do? Do you see a doctor or take medicine yourself?',
   kw:['bị','cảm','thuốc','uống','bác sĩ','nghỉ','nước','ngủ','sốt','ho'],rp:false},
  {stage:1,time:50,
   vi:'Thời tiết ở đây có làm bạn bị bệnh không? Bạn hay bị bệnh gì khi thời tiết thay đổi?',
   tts:'Thời tiết ở đây có làm bạn bị bệnh không? Bạn hay bị bệnh gì khi thời tiết thay đổi?',
   en:'Does the weather here make you sick? What illnesses do you get when the weather changes?',
   kw:['bị','thời tiết','cảm','sốt','ho','lạnh','nóng','thay đổi','thường','mùa'],rp:false},
  // Level Check Food
  {stage:2,time:45,
   vi:'Bạn thường ăn gì vào buổi sáng? Bữa sáng có quan trọng với bạn không?',
   tts:'Bạn thường ăn sáng gì? Bữa sáng có quan trọng với bạn không?',
   en:'What do you usually have for breakfast? Is breakfast important to you?',
   kw:['ăn','sáng','quan trọng','bánh','cơm','phở','bún','cà phê','sữa','vì'],rp:false},
  {stage:2,time:50,
   vi:'Có món ăn nào bạn không thể ăn được không? Tại sao?',
   tts:'Có món ăn nào bạn không thể ăn được không? Tại sao?',
   en:'Is there any food you cannot eat? Why?',
   kw:['không','ăn được','dị ứng','cay','mặn','béo','thịt','hải sản','vì','kiêng'],rp:false},
  // Probe
  {stage:3,time:75,
   vi:'Kể cho thầy/cô nghe về lần bạn bị bệnh nặng nhất. Bạn bị gì? Bạn đã làm gì? Bạn cảm thấy thế nào sau đó?',
   tts:'Kể cho thầy cô nghe về lần bạn bị bệnh nặng nhất. Bạn bị gì? Bạn đã làm gì? Bạn cảm thấy thế nào sau đó?',
   en:'Tell me about the time you were most seriously ill. What was wrong? What did you do? How did you feel afterward?',
   kw:['bị','ốm','sốt','bác sĩ','thuốc','đau','lần','rồi','sau đó','và','nhưng','cảm thấy'],rp:false},
  // Role Play — Restaurant
  {stage:4,time:90,
   vi:'🍜 TÌNH HUỐNG: Bạn đang ở Việt Nam và vào một nhà hàng.\n\nNgười phục vụ hỏi: "Bạn dùng gì ạ?"\n\nHãy:\n① Gọi ít nhất hai món\n② Hỏi về một món bạn chưa biết\n③ Hỏi xem có món chay không',
   tts:'Tình huống: Bạn đang ở Việt Nam và vào một nhà hàng. Người phục vụ hỏi: Bạn dùng gì ạ? Hãy gọi ít nhất hai món, hỏi về một món bạn chưa biết, và hỏi xem có món chay không.',
   en:'ROLE PLAY: You are in Vietnam and enter a restaurant. Server asks what you would like. Order two dishes, ask about an unfamiliar dish, and ask if there is a vegetarian option.',
   kw:['gọi','món','phở','cơm','bún','canh','rau','chay','thịt','là gì','ngon','cho tôi','dùng'],rp:true},
  // Wind-down
  {stage:5,time:35,
   vi:'Khi học tiếng Việt về chủ đề sức khỏe và ăn uống, điều gì khó nhất với bạn?',
   tts:'Khi học tiếng Việt về chủ đề sức khỏe và ăn uống, điều gì khó nhất với bạn?',
   en:'When learning Vietnamese about health and food, what was most difficult for you?',
   kw:['khó','học','từ','phát âm','nhớ','sức khỏe','ăn uống','tiếng Việt','vì','thú vị'],rp:false}
];

// ─── STATE ────────────────────────────────────────────────────
let S={
  screen:'welcome',
  name:'',section:'',
  qi:0,qState:'tts',
  cdown:3,
  timeLeft:0,totalTime:0,
  curTr:'',finalTr:'',
  responses:[],
  audioChunks:[],    // chunks for current question
  audioBlobs:[],     // one Blob per question (null if no audio)
  audioURLs:[],      // one object URL per question (null if no audio)
  scores:null,
  stream:null,recorder:null,recog:null,
  timerInterval:null,cdInterval:null
};

// ─── AUDIO PLAYBACK with TTS fallback (recordings optional) ────
let _qAudio = null;
function _ttsSpeak(text, onDone){
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='vi-VN';utt.rate=0.82;utt.pitch=1.0;
  const voices=speechSynthesis.getVoices();
  const vi=voices.find(v=>v.lang.startsWith('vi'));
  if(vi)utt.voice=vi;
  const maxMs=Math.max(text.length*130,4000);
  let done=false;
  const guard=setTimeout(()=>{if(!done){done=true;onDone()}},maxMs);
  utt.onend=()=>{if(!done){done=true;clearTimeout(guard);onDone()}};
  utt.onerror=()=>{if(!done){done=true;clearTimeout(guard);onDone()}};
  speechSynthesis.speak(utt);
}
function speakQuestion(text, onDone){
  if(_qAudio){ _qAudio.pause(); _qAudio.src=''; _qAudio=null; }
  const file = Q_AUDIO[S.qi];
  if(!file){ onDone(); return; }
  const audio = new Audio(file);
  _qAudio = audio;
  let fired = false;
  function done(){ if(!fired){ fired=true; _qAudio=null; onDone(); } }
  audio.onended = done;
  audio.onerror = done;  // file error → advance, no TTS
  audio.play().catch(()=>{
    const btn=document.getElementById('tap-play-btn');
    if(btn){
      btn.style.display='inline-flex';
      btn.onclick=()=>{ btn.style.display='none'; audio.play().catch(done); };
    } else { done(); }
  });
}

// ─── RECORDING ────────────────────────────────────────────────
async function askMic(){
  try{S.stream=await navigator.mediaDevices.getUserMedia({audio:true});return true}
  catch(e){return false}
}

function startRecording(){
  S.curTr='';S.finalTr='';
  S.audioChunks=[];

  if(S.stream){
    try{
      S.recorder=new MediaRecorder(S.stream,{mimeType:'audio/webm'});
    }catch(e){
      try{S.recorder=new MediaRecorder(S.stream)}catch(e2){S.recorder=null}
    }
    if(S.recorder){
      S.recorder.ondataavailable=e=>{
        if(e.data&&e.data.size>0)S.audioChunks.push(e.data);
      };
      S.recorder.onstop=()=>{
        if(S.audioChunks.length>0){
          const mimeType=S.recorder.mimeType||'audio/webm';
          const blob=new Blob(S.audioChunks,{type:mimeType});
          S.audioBlobs.push(blob);
          S.audioURLs.push(URL.createObjectURL(blob));
        }else{
          S.audioBlobs.push(null);
          S.audioURLs.push(null);
        }
      };
      S.recorder.start(200); // collect chunks every 200ms
    }
  }else{
    S.audioBlobs.push(null);S.audioURLs.push(null);
  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    S.recog=new SR();
    S.recog.continuous=true;S.recog.interimResults=true;S.recog.lang='vi-VN';
    S.recog.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';
        else int+=e.results[i][0].transcript;
      }
      S.finalTr+=fin;S.curTr=S.finalTr+int;
      const el=document.getElementById('trbox');
      if(el){el.textContent=S.curTr||'Đang nghe…';el.className='tr-box'}
    };
    S.recog.onerror=()=>{};
    try{S.recog.start()}catch(e){}
  }
}

function stopRecording(){
  if(S.recog){try{S.recog.stop()}catch(e){}}
  if(S.recorder&&S.recorder.state!=='inactive'){
    try{S.recorder.stop()}catch(e){} // triggers onstop → blob creation
  }else if(S.stream){
    // recorder wasn't started, push nulls
    S.audioBlobs.push(null);S.audioURLs.push(null);
  }
  S.curTr=S.finalTr.trim();
}

// ─── TIMER ────────────────────────────────────────────────────
function startTimer(seconds){
  S.totalTime=seconds*1000;S.timeLeft=S.totalTime;
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    S.timeLeft-=100;
    updateTimerUI();
    if(S.timeLeft<=0){clearInterval(S.timerInterval);handleTimerEnd()}
  },100);
}
function updateTimerUI(){
  const pct=Math.max(0,S.timeLeft/S.totalTime*100);
  const secs=Math.ceil(S.timeLeft/1000);
  const fill=document.getElementById('timer-fill');
  const num=document.getElementById('timer-num');
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'#27AE60':pct>25?'#F39C12':'#E74C3C'}
  if(num){num.textContent=secs+'s';num.style.color=pct>50?'#27AE60':pct>25?'#F39C12':'#E74C3C'}
}
function handleTimerEnd(){
  stopRecording();S.qState='advancing';render();
  setTimeout(()=>advanceQuestion(),1400); // extra time for recorder.onstop to fire
}
function doneSpeaking(){
  clearInterval(S.timerInterval);
  stopRecording();S.qState='advancing';render();
  setTimeout(()=>advanceQuestion(),1100);
}
function advanceQuestion(){
  S.responses.push(S.curTr||S.finalTr||'');
  if(S.qi<Qs.length-1){
    S.qi++;S.qState='tts';S.curTr='';S.finalTr='';render();beginQuestion();
  }else{
    S.scores=calcScores(S.responses);S.screen='results';render();
  }
}

// ─── QUESTION FLOW ────────────────────────────────────────────
function beginQuestion(){
  S.qState='tts';
  speakQuestion(Qs[S.qi].tts,()=>startCountdown());
}
function startCountdown(){
  S.qState='countdown';S.cdown=3;render();
  S.cdInterval=setInterval(()=>{
    S.cdown--;
    if(S.cdown<=0){
      clearInterval(S.cdInterval);
      S.qState='recording';render();
      startRecording();
      startTimer(Qs[S.qi].time);
    }else{
      const el=document.getElementById('cdnum');
      if(el){el.textContent=S.cdown;el.style.animation='none';void el.offsetHeight;el.style.animation=''}
    }
  },1000);
}

// ─── SCORING ──────────────────────────────────────────────────
function wc(t){return t.trim().split(/\s+/).filter(w=>w.length>1).length}
function calcScores(rs){
  let tp=0;
  rs.forEach(r=>{const w=wc(r);if(w>=18)tp+=1.5;else if(w>=8)tp+=1.0;else if(w>=3)tp+=0.5});
  const task=Math.min(12,Math.round(tp));
  const avg=rs.reduce((s,r)=>s+wc(r),0)/Math.max(rs.length,1);
  const txt=avg<4?1:avg<8?2:avg<14?3:avg<22?4:avg<35?5:6;
  const all=rs.join(' ').toLowerCase();
  const totKW=Qs.reduce((s,q)=>s+q.kw.length,0);
  const matKW=Qs.reduce((s,q,i)=>{if(!rs[i])return s;const t=rs[i].toLowerCase();return s+q.kw.filter(k=>t.includes(k)).length},0);
  const kvr=matKW/totKW;const cont=kvr<0.13?1:kvr<0.28?2:3;
  const pol=['dạ','vâng','thưa','bác sĩ','xin lỗi','cảm ơn','thầy','cô'];
  const pc=pol.filter(p=>all.includes(p)).length;const ctx=pc===0?1:pc<=2?2:3;
  const conn=['và','nhưng','vì','nên','khi','nếu','thì','mà','để','hoặc'];
  const cc=conn.filter(c=>all.includes(c)).length;
  const acc=avg<4?1:avg<8&&cc<2?2:avg<8?3:cc<3?4:cc<5?5:6;
  return{task,txt,cont,ctx,acc,total:task+txt+cont+ctx+acc};
}
function grade(n){return n>=27?'A':n>=24?'A−':n>=22?'B+':n>=20?'B':n>=18?'B−':n>=16?'C+':n>=15?'C':'D'}
function level(n){
  if(n>=27)return{lbl:'Intermediate Mid',clr:'#27AE60'};
  if(n>=23)return{lbl:'Intermediate Low',clr:'#F39C12'};
  if(n>=18)return{lbl:'Novice High',clr:'#E67E22'};
  return{lbl:'Novice Mid',clr:'#C0392B'};
}
function detectedVocab(rs){
  const all=rs.join(' ').toLowerCase();
  return['bị ốm','bị sốt','bị đau đầu','uống thuốc','nghỉ ngơi','đi bác sĩ','từ sáng','hết rồi',
    'nên làm gì','mấy lần','một ngày','thích ăn','gọi món','không thích','cay','ngọt','mặn',
    'nước mắm','ngon lắm','xin lỗi','cảm ơn','dạ','vâng','thưa thầy','thưa cô'].filter(v=>all.includes(v));
}
function missingStructures(rs){
  const all=rs.join(' ').toLowerCase();
  return[
    {t:t=>t.includes('bị'),m:'"bị" + illness'},
    {t:t=>t.includes('uống'),m:'uống thuốc'},
    {t:t=>t.includes('từ'),m:'"từ" time expression'},
    {t:t=>t.includes('nên'),m:'"nên" for advice'},
    {t:t=>/phở|cơm|bún|bánh/.test(t),m:'specific dish names'},
    {t:t=>t.includes('vì'),m:'"vì" for reasons'},
    {t:t=>/dạ|vâng|thưa/.test(t),m:'polite markers (dạ, vâng, thưa)'}
  ].filter(c=>!c.t(all)).map(c=>c.m).slice(0,4);
}

// ─── DOWNLOAD ─────────────────────────────────────────────────
async function blobToBase64(blob){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onloadend=()=>resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

async function downloadRecordings(){
  const btn=document.getElementById('dl-btn');
  const status=document.getElementById('dl-status');
  if(btn)btn.disabled=true;
  if(status){status.style.display='block';status.textContent='Preparing ZIP…'}
  const hasAudio=S.audioBlobs.some(b=>b!==null);
  if(!hasAudio){
    if(status)status.textContent='No recordings found.';
    if(btn)btn.disabled=false;return;
  }
  try{
    const zip=new JSZip();
    const safeName=(S.name||'Student').replace(/[^a-zA-Z0-9]/g,'_');
    const ext=S.audioBlobs.find(b=>b)?.type?.includes('ogg')?'ogg':'webm';
    const now=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

    S.audioBlobs.forEach((blob,i)=>{
      if(!blob)return;
      const stageName=STAGES[Qs[i].stage].replace(/[^a-zA-Z]/g,'_');
      zip.file(`Q${String(i+1).padStart(2,'0')}_${stageName}.${ext}`,blob);
    });

    let txt=`VIET 102 Final Speaking Exam Response Transcript
Student: ${S.name||'Unknown'}${S.section?' | Section '+S.section:''}
Date: ${now}

`;
    Qs.forEach((q,i)=>{
      txt+=`Q${i+1} - ${STAGES[q.stage]}
Prompt: ${q.vi.replace(/\n/g,' ')}
Transcript: ${S.responses[i]||'[no response]'}

`;
    });
    zip.file('response_transcript.txt',txt);

    if(status)status.textContent='Building instructor report…';
    const audioDataURIs=await Promise.all(
      S.audioBlobs.map(b=>b?blobToBase64(b):Promise.resolve(null))
    );
    const instrHTML=buildInstructorHTML(audioDataURIs,now);
    zip.file('instructor_report.html',instrHTML);

    const content=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(content);
    a.download=`VIET102_${safeName}_Spring2026.zip`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    if(status)status.textContent='✓ ZIP downloaded — submit to your instructor.';
  }catch(e){
    console.error(e);
    if(status)status.textContent='Download failed: '+e.message;
  }
  if(btn)btn.disabled=false;
}

  <p style="font-size:14px;color:var(--gray);line-height:1.65;margin-bottom:26px">This exam records your spoken responses. Audio stays on your device and is never uploaded anywhere automatically — you submit it yourself at the end.</p>
  <button class="btn btn-navy btn-full" onclick="grantMic()">Allow Microphone & Start Exam</button>
  <p style="font-size:12px;color:#AAA;margin-top:12px">A browser popup will appear — click "Allow"</p>
</div></div>`}

function rExam(){
  const q=Qs[S.qi];
  const pct=Math.round(S.qi/Qs.length*100);
  const isRec=S.qState==='recording';
  const isTTS=S.qState==='tts';
  const isCd=S.qState==='countdown';
  const isAdv=S.qState==='advancing';
  const tr=S.curTr||S.finalTr;

  const stageDots=STAGES.map((_,i)=>{
    const qs=Qs.filter(q=>q.stage===i);const fi=Qs.findIndex(q=>q.stage===i);
    let cls='dot';
    if(S.qi>fi+qs.length-1)cls+=' done';else if(S.qi>=fi)cls+=' active';
    return`<div class="${cls}"></div>`;
  }).join('');

  const wbars=[18,28,22,38,26,34,20,36,24,32,18,28,22,36,20].map((h,i)=>
    `<div class="wb" style="height:${h}px;animation-delay:${(i*.065).toFixed(2)}s"></div>`).join('');

  const tpct=()=>Math.max(0,S.timeLeft/S.totalTime*100);
  const tclr=()=>tpct()>50?'#27AE60':tpct()>25?'#F39C12':'#E74C3C';
  const tsecs=()=>Math.ceil(S.timeLeft/1000);

  if(isAdv){return`<div class="screen top"><div class="wrap">
    <div class="exam-bar"><span class="title">VIET 102 — Final Speaking Exam</span><span class="meta">Spring 2026 · ${S.name||'Student'}</span></div>
    <div class="adv-msg"><strong>✓</strong>Moving to next question…</div>
  </div></div>`}

  return`<div class="screen top"><div class="wrap">
  <div class="exam-bar"><span class="title">VIET 102 — Final Speaking Exam</span><span class="meta">Spring 2026 · ${S.name||'Student'}</span></div>
  <div class="prog-header">
    <div class="prog-top">
      <span class="stage-name" style="color:${STAGE_CLR[q.stage]}">${STAGES[q.stage]}</span>
      <span class="q-num">Question ${S.qi+1} of ${Qs.length}</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dots">${stageDots}</div>
  </div>
  <div class="q-card">
    ${q.rp?'<span class="rp-badge">Role Play</span>':''}
    <div class="q-vi">${q.vi}</div>
    <div class="q-en">${q.en}</div>
    ${isTTS?`<div class="tts-indicator"><span class="tts-dot"></span>Playing question…</div>`:''}
  </div>
  ${isRec?`<div class="timer-section">
    <div class="timer-row">
      <span class="timer-label">⏱ Time Remaining</span>
      <span class="timer-num" id="timer-num" style="color:${tclr()}">${tsecs()}s</span>
    </div>
    <div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:${tpct()}%;background:${tclr()}"></div></div>
  </div>`:''}
  <div class="rec-panel">
    <div class="rec-center">
      ${isTTS?`<div class="mic-btn mic-wait">🔊</div><p class="rec-status">Listening to question…</p>`:''}
      ${isCd?`<div class="countdown-num" id="cdnum">${S.cdown}</div><p class="rec-status">Get ready to speak…</p>`:''}
      ${isRec?`<div class="mic-btn mic-rec">🎙️</div><p class="rec-status"><strong>Recording…</strong> Speak now</p>`:''}
    </div>
    ${isRec?`<div class="wave on">${wbars}</div>`:`<div class="wave">${wbars}</div>`}
    ${isRec?`<div class="tr-label"><span class="live-dot"></span>&nbsp;Live Transcript</div>
    <div class="tr-box${!tr?' tr-empty':''}" id="trbox">${tr||'Đang nghe… / Listening…'}</div>
    <div class="act-row"><button class="btn btn-green" onclick="doneSpeaking()">Done Speaking ✓</button></div>`:''}
  </div>
</div></div>`}

function rResults(){
  const now=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const logItems=Qs.map((q,i)=>{
    const url=S.audioURLs[i]||null;
    const stClr=STAGE_CLR[q.stage]||'#13294B';
    const LCL=typeof LESSON_CLR!=='undefined'?LESSON_CLR:{8:'#8E44AD',9:'#3498DB',11:'#E67E22',12:'#E74C3C',13:'#16A085'};
    const badge=q.lesson?`<span style="background:${LCL[q.lesson]||'#888'};color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px">L${q.lesson}</span>`:'';
    return `<div style="padding:18px 0;border-bottom:1px solid var(--light)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px">Q${i+1}</span>
        <span style="font-size:11px;font-weight:700;color:${stClr};text-transform:uppercase;letter-spacing:.5px">${STAGES[q.stage]}</span>${badge}
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:3px">${q.vi.replace(/\\n/g,' ')}</div>
      <div style="font-size:12px;color:var(--gray);font-style:italic;margin-bottom:10px">${q.en.replace(/\\n/g,' ')}</div>
      ${S.responses[i]?`<div style="background:#F5F7FA;border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.6">${S.responses[i]}</div>`:`<div style="font-size:13px;color:#CCC;font-style:italic;margin-bottom:10px">[No transcript captured]</div>`}
      ${url?`<audio controls src="${url}" style="width:100%;height:34px"></audio>`:`<div style="font-size:12px;color:#CCC;font-style:italic">[No audio]</div>`}
    </div>`;
  }).join('');
  return`<div class="screen top"><div class="wrap">
  <div class="res-masthead" style="text-align:center;padding:44px 32px">
    <div style="font-size:64px;line-height:1;margin-bottom:18px">&#x2713;</div>
    <div class="res-name">${S.name||'Student'}${S.section?' · Section '+S.section:''}</div>
    <div class="res-course" style="margin-top:8px">VIET 102 — Final Speaking Exam · Spring 2026</div>
    <p style="font-size:13px;color:#A8C0D6;margin-top:10px">${now}</p>
  </div>
  <div class="section" style="text-align:center;padding:36px 30px">
    <p style="font-size:15px;color:var(--dark);line-height:1.75;margin-bottom:28px">
      Your responses have been recorded successfully.<br>
      Download the ZIP file below and submit it to your instructor.
    </p>
    <button class="btn btn-blue btn-full" id="dl-btn" onclick="downloadRecordings()">
      &#x1F4E5; Download &amp; Submit (.zip)
    </button>
    <p class="download-status" id="dl-status" style="margin-top:14px"></p>
    <button class="btn btn-ghost btn-full" style="margin-top:12px" onclick="
      const el=document.getElementById('student-log');
      const open=el.style.display!=='none';
      el.style.display=open?'none':'block';
      this.textContent=open?'&#x1F4CB; View My Responses':'&#x25B2; Hide My Responses';
    ">&#x1F4CB; View My Responses</button>
  </div>
  <div id="student-log" style="display:none">
    <div class="section">
      <h3 style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:20px">My Responses</h3>
      <div style="font-size:12px;color:var(--gray);margin-bottom:16px;font-style:italic">Review your answers. Submit the ZIP file above to receive instructor feedback and your score.</div>
      ${logItems}
    </div>
  </div>
</div></div>`}

// ─── ACTIONS ──────────────────────────────────────────────────
function goInstructions(){
  const n=document.getElementById('inp-name');
  const sec=document.getElementById('inp-sec');
  if(n)S.name=n.value.trim();if(sec)S.section=sec.value.trim();
  if(!S.name){alert('Please enter your name before continuing.');return}
  S.screen='instructions';render();
}
async function grantMic(){
  try{const _ac=new(window.AudioContext||window.webkitAudioContext)();const _buf=_ac.createBuffer(1,1,22050);const _src=_ac.createBufferSource();_src.buffer=_buf;_src.connect(_ac.destination);_src.start(0);_ac.resume();}catch(e){}
  const ok=await askMic();
  if(ok){S.screen='exam';render();beginQuestion();}
  else{alert('Microphone access was denied.\n\nPlease click the microphone icon in your browser address bar, allow access, and reload the page.')}
}

// ─── INIT ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
